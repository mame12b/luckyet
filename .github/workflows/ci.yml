name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ---- Backend: install + sanity check ----
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      - name: Syntax check all JS files
        working-directory: ./server
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | \
            xargs -0 -n1 node --check

  # ---- Player frontend: build ----
  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      - name: Build
        working-directory: ./client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_API_ORIGIN: http://localhost:5000

  # ---- Admin frontend: build ----
  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json
      - name: Install dependencies
        working-directory: ./admin
        run: npm ci
      - name: Build
        working-directory: ./admin
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api
          VITE_API_ORIGIN: http://localhost:5000
          VITE_PLAYER_URL: http://localhost:8080

  # ---- Docker: verify all images build ----
  docker-build:
    runs-on: ubuntu-latest
    needs: [server, client, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Build server image
        run: docker build -t luckyet-server ./server
      - name: Build client image
        run: docker build -t luckyet-client --build-arg VITE_API_URL=http://localhost:5000/api ./client
      - name: Build admin image
        run: docker build -t luckyet-admin --build-arg VITE_API_URL=http://localhost:5000/api ./admin
