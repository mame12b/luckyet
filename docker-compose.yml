# LuckyET stack — local & deployable.
# Database is MongoDB Atlas (cloud), NOT containerized.
#
# Required in ./.env (same folder as this file):
#   MONGO_URI, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET,
#   SEED_ADMIN_EMAIL, SEED_ADMIN_PHONE, SEED_ADMIN_PIN, SEED_ADMIN_NAME
#
# Optional in .env (sensible defaults applied):
#   CLIENT_URL, ADMIN_URL, VITE_API_URL, VITE_API_ORIGIN, VITE_PLAYER_URL

services:
  server:
    build:
      context: ./server
    container_name: luckyet-server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 12h
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:8081}
      QUANTUM_API_URL: https://qrng.anu.edu.au/API/jsonI.php
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE}
      SEED_ADMIN_PIN: ${SEED_ADMIN_PIN}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME}
    volumes:
      - ./data/uploads:/app/uploads/receipts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:5000}
    container_name: luckyet-client
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:5000}
        VITE_PLAYER_URL: ${VITE_PLAYER_URL:-http://localhost:8080}
    container_name: luckyet-admin
    ports:
      - "8081:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
